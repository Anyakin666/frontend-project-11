<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSS Агрегатор</title>
</head>
<body>
    <div class="card-custom">
        <div class="text-center mb-4">
            <h1></h1>
            <p class="subtitle"></p>
        </div>
        
        <form id="rss-form">
            <div class="mb-3">
                <label for="url-input" class="form-label"></label>
                <div class="input-group">
                    <input 
                        type="text" 
                        class="form-control" 
                        id="url-input" 
                    />
                    <button type="submit" class="btn btn-primary"></button>
                </div>
                <div class="example"></div>
                <div id="url-feedback" class="feedback-custom"></div>
            </div>
        </form>
        
        <div id="feed-status"></div>
        
        <!-- Секция фидов -->
        <div class="feeds-section mt-4">
            <h2 class="h4 mb-3">Фиды</h2>
            <div id="feeds-container"></div>
        </div>
        
        <!-- Секция постов -->
        <div class="posts-section mt-4">
            <h2 class="h4 mb-3">Посты</h2>
            <div id="posts-container"></div>
        </div>
    </div>
    
    <script type="module" src="/src/main.js"></script>
</body>
</html>
